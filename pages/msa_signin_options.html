<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>💻 OOBE Sandbox | Sign-In Options</title>
  <link rel="stylesheet" href="/css/win11.css" type="text/css" id="style-base" />
  <link rel="stylesheet" href="/css/win11.light.css" type="text/css" id="style-light" />
  <link rel="stylesheet" href="/css/win11.dark.css" type="text/css" id="style-dark" />
  <script>
    (function() {
      // Prevent theme flash by setting up everything before any content renders
      var savedMode = localStorage.getItem('themeMode') || 'light';
      var savedPalette = localStorage.getItem('themePalette') || 'standard';
      var savedCssStyle = localStorage.getItem('cssStyle') || 'win11';
      var root = document.documentElement;
      
      // Apply CSS style links
      if (savedCssStyle === 'evolved') {
        document.getElementById('style-base').href = '/css/evolved.css';
        document.getElementById('style-light').href = '/css/evolved.light.css';
        document.getElementById('style-dark').href = '/css/evolved.dark.css';
      } else {
        // Explicitly set win11 as default
        document.getElementById('style-base').href = '/css/win11.css';
        document.getElementById('style-light').href = '/css/win11.light.css';
        document.getElementById('style-dark').href = '/css/win11.dark.css';
      }
      
      // Apply all theme classes immediately to prevent flash
      root.classList.remove('dark', 'light', 'dune', 'sapphire', 'violet', 'win11', 'evolved');
      root.classList.add(savedCssStyle, savedMode);
      
      if (savedPalette !== 'standard') {
        root.classList.add(savedPalette);
      }
    })();
  </script>
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-standard.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-violet.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-dune.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-sapphire.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
  <link rel="preload" as="image" href="/assets/visuals/background-blurred.jpg" />
</head>
<body data-page-id="msa_signin_options" data-oobe>
  <div class="oobe-background"></div>
  <div id="oobe-nav-root"></div>
  <div class="oobe-shell">
    <div class="oobe-main">
      <div class="oobe-card">
        <div class="card-back-button">
          <a href="MSA_sisu.html" class="back-btn" aria-label="Back to sign in">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
        <div id="lottie" class="lottie-container"></div>

        <div class="oobe-content">
          <header class="oobe-header">
            <h1>Other ways to sign in</h1>
            <div class="subtitle">Choose what works best for you</div>
          </header>
          <div class="oobe-body">
            <div class="msa-signin-container">
              <div class="signin-options-list">
                <mai-button class="signin-option-card" appearance="neutral" data-option="passkey">
                  <div class="option-icon">🔑</div>
                  <div class="option-text">
                    <div class="option-title">Passkey</div>
                    <div class="option-desc">Use your fingerprint or face to sign in instantly</div>
                  </div>
                </mai-button>
                <mai-button class="signin-option-card" appearance="neutral" data-option="phone">
                  <div class="option-icon">📱</div>
                  <div class="option-text">
                    <div class="option-title">Phone number</div>
                    <div class="option-desc">Sign in with a phone number instead</div>
                  </div>
                </mai-button>
                <mai-button class="signin-option-card" appearance="neutral" data-option="local">
                  <div class="option-icon">🖥️</div>
                  <div class="option-text">
                    <div class="option-title">Local account</div>
                    <div class="option-desc">Create a local account without a Microsoft account</div>
                  </div>
                </mai-button>
              </div>
            </div>
          </div>
          <div class="oobe-ctas">
            <mai-button appearance="subtle" size="large" data-cta="skip">Back</mai-button>
            <mai-button appearance="primary" size="large" data-cta="next" id="signin-options-next">Continue</mai-button>
          </div>
        </div>

      </div>
      <div class="oobe-below-actions">
        <mai-button type="button" appearance="subtle" aria-label="Mode settings"><img src="/assets/icons/mode.svg" alt="" /></mai-button>
        <mai-button type="button" appearance="subtle" aria-label="Keyboard settings"><img src="/assets/icons/keyboard.svg" alt="" /></mai-button>
        <mai-button type="button" appearance="subtle" aria-label="Accessibility options"><img src="/assets/icons/accessibility.svg" alt="" /></mai-button>
        <mai-button type="button" appearance="subtle" aria-label="Volume settings"><img src="/assets/icons/volume.svg" alt="" /></mai-button>
      </div>
    </div>

  </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>
  <script src="/assets/animations/MSA_signin.js"></script>
  <script src="/js/web-components.min.js"></script>
  <script src="/js/flow.js"></script>
  <script src="/js/page.js"></script>

</body>

</html>
