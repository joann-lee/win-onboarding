<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>document.documentElement.style.backgroundColor='#000';</script>
  <title>💻 OOBE Sandbox | Reboot</title>
  <style>
    /* Critical styles - must load before anything else to prevent layout shift */
    html, body {
      background: #000 !important;
      margin: 0;
      padding: 0;
    }
    body[data-page-id="reboot"],
    body[data-page-id="reboot"] * {
      view-transition-name: none !important;
    }
    body[data-page-id="reboot"] {
      background: #000 !important;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    body[data-page-id="reboot"] .oobe-background {
      display: none !important;
    }
    .reboot-container {
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999999;
    }
    .reboot-content {
      opacity: 1;
      transition: opacity 0.5s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .microsoft-logo-frame {
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .microsoft-logo {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
      animation: logoPulse 2s cubic-bezier(0.33,0,0.67,1) infinite alternate;
    }
    @keyframes logoPulse {
      0% { opacity: 1; }
      100% { opacity: 0.85; }
    }
  </style>
  <script src="/js/theme-init.js"></script>
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-standard.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-violet.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-dune.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-sapphire.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-slate.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-emerald.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
</head>

<body data-page-id="reboot" data-oobe>
  <!-- No oobe-background on reboot - pure black screen -->
  <div class="reboot-container">
    <div class="reboot-content">
      <div class="microsoft-logo-frame">
        <svg class="microsoft-logo" width="140" height="140" viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 0H21.739V21.737H0V0ZM24.0056 0H45.7426V21.737H24.0056V0ZM0 24.0066H21.739V45.7426H0V24.0066ZM24.0056 24.0066H45.7426V45.7426H24.0056V24.0066Z" fill="white"/>
        </svg>
      </div>
    </div>
  </div>

  <script src="/js/flow.js"></script>

  <script>
    // Handle reboot continuation
    document.addEventListener('DOMContentLoaded', function() {
      // Wait for reboot animation then fade out and continue to next page
      setTimeout(() => {
        // Fade out the reboot content before navigating
        const rebootContent = document.querySelector('.reboot-content');
        if (rebootContent) {
          rebootContent.style.transition = 'opacity 0.5s ease-out';
          rebootContent.style.opacity = '0';
        }
        
        // Navigate after fade completes
        setTimeout(() => {
          const nextPageId = sessionStorage.getItem('oobeRestartDestination');
          if (nextPageId) {
            sessionStorage.removeItem('oobeRestartDestination');
            const nextFile = window.getPageFile(nextPageId);
            if (nextFile) {
              const nextHref = window.getPagePath(nextFile);
              window.location.href = nextHref;
            } else {
              // If no file found, go to desktop as fallback
              window.location.href = '/desktop/';
            }
          } else {
            // No destination set, go to desktop
            window.location.href = '/desktop/';
          }
        }, 500);
      }, 1400); // 1.4s reboot animation + 0.5s fade = ~1.9s total
    });
  </script>
</body>

</body>

</html>
