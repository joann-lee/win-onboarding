<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>💻 OOBE Sandbox | Reboot</title>  <script>
    // Load CSS files based on saved style preference - runs synchronously during page parsing
    (function() {
      const savedCssStyle = localStorage.getItem('cssStyle') || 'win11';
      const cssLinks = {
        win11: '<link rel=\"stylesheet\" href=\"/css/win11.css\" type=\"text/css\" /><link rel=\"stylesheet\" href=\"/css/win11.light.css\" type=\"text/css\" /><link rel=\"stylesheet\" href=\"/css/win11.dark.css\" type=\"text/css\" />',
        evolved: '<link rel=\"stylesheet\" href=\"/css/evolved.css\" type=\"text/css\" /><link rel=\"stylesheet\" href=\"/css/evolved.light.css\" type=\"text/css\" /><link rel=\"stylesheet\" href=\"/css/evolved.dark.css\" type=\"text/css\" />'
      };
      document.write(cssLinks[savedCssStyle] || cssLinks.win11);
    })();
  </script>  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-purple.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
  <link rel="preload" as="image" href="/assets/visuals/background-blurred.jpg" />
</head>

<body data-page-id="reboot" data-oobe>
  <div class="oobe-background"></div>
  <div class="reboot-container">
    <div class="reboot-content">
      <div class="microsoft-logo-frame">
        <svg class="microsoft-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Microsoft Four-Square Logo -->
          <rect x="10" y="10" width="30" height="30" fill="#FFFFFF" />
          <rect x="55" y="10" width="30" height="30" fill="#FFFFFF" />
          <rect x="10" y="55" width="30" height="30" fill="#FFFFFF" />
          <rect x="55" y="55" width="30" height="30" fill="#FFFFFF" />
        </svg>
      </div>
    </div>
  </div>

  <script src="/js/flow.js"></script>
  <script>
    (function() {
      var style = localStorage.getItem('cssStyle') || 'win11';
      var links = style === 'evolved' 
        ? '<link rel="stylesheet" href="/css/evolved.css"><link rel="stylesheet" href="/css/evolved.light.css"><link rel="stylesheet" href="/css/evolved.dark.css">'
        : '<link rel="stylesheet" href="/css/win11.css"><link rel="stylesheet" href="/css/win11.light.css"><link rel="stylesheet" href="/css/win11.dark.css">';
      document.write(links);
    })();
  </script>

  <style>
    body[data-page-id="reboot"] {
      background: #000;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .reboot-container {
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
    }

    .reboot-content {
      opacity: 1;
      transition: opacity 0.5s ease-in-out;
    }

    .microsoft-logo-frame {
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .microsoft-logo {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
    }
  </style>

</body>

</html>
