<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>💻 OOBE Sandbox | Reboot</title>
  <link rel="stylesheet" href="/css/win11.css" type="text/css" id="style-base" />
  <link rel="stylesheet" href="/css/win11.light.css" type="text/css" id="style-light" />
  <link rel="stylesheet" href="/css/win11.dark.css" type="text/css" id="style-dark" />
  <script>
    (function() {
      // Prevent theme flash by setting up everything before any content renders
      var savedMode = localStorage.getItem('themeMode') || 'light';
      var savedPalette = localStorage.getItem('themePalette') || 'standard';
      var savedCssStyle = localStorage.getItem('cssStyle') || 'win11';
      var root = document.documentElement;
      
      // Apply CSS style links
      if (savedCssStyle === 'evolved') {
        document.getElementById('style-base').href = '/css/evolved.css';
        document.getElementById('style-light').href = '/css/evolved.light.css';
        document.getElementById('style-dark').href = '/css/evolved.dark.css';
      } else {
        // Explicitly set win11 as default
        document.getElementById('style-base').href = '/css/win11.css';
        document.getElementById('style-light').href = '/css/win11.light.css';
        document.getElementById('style-dark').href = '/css/win11.dark.css';
      }
      
      // Apply all theme classes immediately to prevent flash
      root.classList.remove('dark', 'light', 'dune', 'sapphire', 'violet', 'win11', 'evolved');
      root.classList.add(savedCssStyle, savedMode);
      
      if (savedPalette !== 'standard') {
        root.classList.add(savedPalette);
      }
    })();
  </script>
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-standard.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-violet.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-dune.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-sapphire.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
  <link rel="preload" as="image" href="/assets/visuals/background-blurred.jpg" />
</head>

<body data-page-id="reboot" data-oobe>
  <div class="oobe-background"></div>
  <div class="reboot-container">
    <div class="reboot-content">
      <div class="microsoft-logo-frame">
        <svg class="microsoft-logo" width="46" height="46" viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 0H21.739V21.737H0V0ZM24.0056 0H45.7426V21.737H24.0056V0ZM0 24.0066H21.739V45.7426H0V24.0066ZM24.0056 24.0066H45.7426V45.7426H24.0056V24.0066Z" fill="white"/>
        </svg>
      </div>
    </div>
  </div>

  <script src="/js/flow.js"></script>

  <script>
    // Handle reboot continuation
    document.addEventListener('DOMContentLoaded', function() {
      // Wait for reboot animation then continue to next page
      setTimeout(() => {
        const nextPageId = sessionStorage.getItem('oobeRestartDestination');
        if (nextPageId) {
          sessionStorage.removeItem('oobeRestartDestination');
          const nextFile = window.getPageFile(nextPageId);
          if (nextFile) {
            const nextHref = window.getPagePath(nextFile);
            window.location.href = nextHref;
          } else {
            // If no file found, go to desktop as fallback
            window.location.href = '/assets/desktop.html';
          }
        } else {
          // No destination set, go to desktop
          window.location.href = '/assets/desktop.html';
        }
      }, 3000); // 3 second reboot animation
    });
  </script>

  <style>
    body[data-page-id="reboot"] {
      background: #000;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .reboot-container {
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
    }

    .reboot-content {
      opacity: 1;
      transition: opacity 0.5s ease-in-out;
    }

    .microsoft-logo-frame {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .microsoft-logo {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
      animation: logoPulse 2s var(--curveEasyEase, cubic-bezier(0.33,0,0.67,1)) infinite alternate;
    }

    @keyframes logoPulse {
      0% {
        opacity: 1;
      }
      100% {
        opacity: 0.85;
      }
    }
  </style>

</body>

</html>
