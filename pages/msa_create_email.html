<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>💻 OOBE Sandbox | Create Email Address</title>
  <link rel="stylesheet" href="/css/win11.css" type="text/css" id="style-base" />
  <link rel="stylesheet" href="/css/win11.light.css" type="text/css" id="style-light" />
  <link rel="stylesheet" href="/css/win11.dark.css" type="text/css" id="style-dark" />
  <script src="/js/theme-init.js"></script>
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-standard.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-violet.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-dune.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-sapphire.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-slate.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-emerald.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
</head>
<body data-page-id="msa_create_email" data-oobe>
  <div class="oobe-background"></div>
  <div id="oobe-nav-root"></div>
  <div class="oobe-shell">
    <div class="oobe-main">
      <div class="oobe-card">
        <div class="card-back-button">
          <a href="MSA_create.html" class="back-btn" aria-label="Back" style="view-transition-name: none;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
        <div id="lottie" class="lottie-container"></div>

        <div class="oobe-content">
          <header class="oobe-header">
            <h1>Let's add your Microsoft account</h1>
            <div class="subtitle">One account connects your device across Microsoft apps and services, like Office, OneDrive, Microsoft Edge and the Microsoft Store.</div>
          </header>
          <div class="oobe-body">
            <div class="msa-signin-container">
              <h2 class="signin-heading">Create account</h2>
              
              <div class="email-creation-form">
                <div class="email-input-group">
                  <mai-text-input
                    id="new-email-input"
                    placeholder="New email"
                    aria-label="New email"
                    appearance="underline"
                    required
                  >
                  </mai-text-input>
                  <div class="email-domain-selector">
                    <mai-select id="email-domain" appearance="underline">
                      <mai-option value="outlook.com">@outlook.com</mai-option>
                      <mai-option value="hotmail.com">@hotmail.com</mai-option>
                      <mai-option value="live.com">@live.com</mai-option>
                    </mai-select>
                  </div>
                </div>
              </div>

              <div class="signin-links">
                <mai-link href="MSA_create.html" size="medium" class="use-email-instead">Use your email instead</mai-link>
              </div>


            </div>
          </div>
          <div class="oobe-ctas">
            <mai-button appearance="subtle" size="large" data-cta="skip" href="MSA_create.html">Back</mai-button>
            <mai-button appearance="primary" size="large" data-cta="next" id="create-email-next" disabled>Next</mai-button>
          </div>
        </div>

      </div>
      <div class="oobe-below-actions">
         <!-- Accessibility section, no need to update -->        <mai-button type="button a11y" appearance="subtle" size="medium" aria-pressed aria-label="Mode settings"><img src="/assets/icons/mode.svg" alt="" /></mai-button>        <mai-button type="button" appearance="subtle" aria-label="Keyboard settings"><img src="/assets/icons/keyboard.svg" alt="" /></mai-button>
        <mai-button type="button" appearance="subtle" aria-label="Accessibility options"><img src="/assets/icons/accessibility.svg" alt="" /></mai-button>
        <mai-button type="button" appearance="subtle" aria-label="Volume settings"><img src="/assets/icons/volume.svg" alt="" /></mai-button>
      </div>
    </div>

  </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>
  <script src="/assets/animations/MSA_signin.js"></script>
  <script src="/js/web-components.min.js"></script>
  <script src="/js/flow.js"></script>
  <script src="/js/page.js"></script>

</body>

</html>
