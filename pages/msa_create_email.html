<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>💻 OOBE Sandbox | Create Email Address</title>
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
  <link rel="preload" as="image" href="/assets/visuals/background-blurred.jpg" />
</head>
<body data-page-id="msa_create_email" data-oobe>
  <div id="oobe-nav-root"></div>
  <div class="oobe-shell">
    <div class="oobe-main">
      <div class="oobe-card">
        <div class="card-back-button">
          <a href="MSA_create.html" class="back-btn" aria-label="Back" style="view-transition-name: none;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
        <div id="lottie" class="lottie-container"></div>

        <div class="oobe-content">
          <header class="oobe-header">
            <h1>Let's add your Microsoft account</h1>
            <div class="subtitle">One account connects your device across Microsoft apps and services, like Office, OneDrive, Microsoft Edge and the Microsoft Store.</div>
          </header>
          <div class="oobe-body">
            <div class="msa-signin-container">
              <h2 class="signin-heading">Create account</h2>
              
              <div class="email-creation-form">
                <div class="email-input-group">
                  <input 
                    type="text" 
                    id="new-email-input" 
                    class="device-name-input" 
                    placeholder="New email"
                    aria-label="New email"
                  />
                  <div class="email-domain-selector">
                    <select id="email-domain" class="domain-select">
                      <option value="outlook.com">@outlook.com</option>
                      <option value="hotmail.com">@hotmail.com</option>
                      <option value="live.com">@live.com</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="signin-links">
                <a href="MSA_create.html" class="use-email-instead">Use your email instead</a>
              </div>


            </div>
          </div>
          <div class="oobe-ctas">
            <a class="button-secondary" data-cta="skip" href="MSA_create.html">Back</a>
            <button class="button-primary" data-cta="next" id="create-email-next" disabled>Next</button>
          </div>
        </div>

      </div>
      <div class="oobe-below-actions">
         <!-- Accessibility section, no need to update -->
        <button type="button a11y" aria-label="Keyboard settings"><img src="/assets/icons/keyboard.svg" alt="" /></button>
        <button type="button a11y" aria-label="Accessibility options"><img src="/assets/icons/accessibility.svg" alt="" /></button>
        <button type="button a11y" aria-label="Volume settings"><img src="/assets/icons/volume.svg" alt="" /></button>
      </div>
    </div>

  </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>
  <script src="/assets/animations/MSA_signin.js"></script>
  <script src="/js/flow.js"></script>
  <script src="/js/page.js"></script>

</body>

</html>
