<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>💻 OOBE Sandbox | Enter Password</title>
  <link rel="stylesheet" href="/css/win11.css" type="text/css" id="style-base" />
  <link rel="stylesheet" href="/css/win11.light.css" type="text/css" id="style-light" />
  <link rel="stylesheet" href="/css/win11.dark.css" type="text/css" id="style-dark" />
  <script src="/js/theme-init.js"></script>
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-standard.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-violet.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-dune.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-sapphire.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-slate.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-emerald.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
</head>
<body data-page-id="msa_sisu_0" data-oobe>
  <div class="oobe-background"></div>
  <div id="oobe-nav-root"></div>
  <div class="oobe-shell">
    <div class="oobe-main">
      <div class="oobe-card">

        <div class="oobe-content">
          <header class="oobe-header">
            <h1>Let's add your Microsoft account</h1>
            <!-- <div class="subtitle">We sent a verification code to your email. Enter it below.</div> -->
          </header>
          <div class="oobe-body">
            <div class="msa-signin-container">
              <div class="msa-signin-form-wrapper">
                <div class="msa-logo">
                  <img src="/assets/visuals/msft-standard-light.svg" 
                       class="msft-logo light-logo" 
                       alt="Microsoft" />
                  <img src="/assets/visuals/msft-standard-dark.svg" 
                       class="msft-logo dark-logo" 
                       alt="Microsoft" />
                </div>
              

                <h2 class="signin-heading">Enter code</h2>
                <div class="signin-info">
                  <p>We emailed a code to <span style="font-weight: 500;"id="email-entered">emailyouentered@outlook.com</span><br/>Please enter the code to sign in.</p>
                </div>
                <mai-text-input
                  id="verification-code-input"
                  placeholder="Enter code"
                  maxlength="6"
                  appearance="underline"
                  type="text"
                  inputmode="numeric"
                  aria-label="Enter verification code"
                  value=""
                >
                </mai-text-input>

                <div class="signin-links">
                  <mai-link href="#" size="medium" class="other-signin-ways">Other ways to sign in</mai-link>
                </div>
              </div>
            </div>
          </div>
          <div class="oobe-ctas">
            <mai-button appearance="subtle" size="large" data-cta="back" style="view-transition-name: none;">Back</mai-button>
            <mai-button appearance="primary" size="large" data-cta="next" id="verify-code-next" disabled>Sign in</mai-button>
          </div>
        </div>

      </div>
      <div class="oobe-below-actions">
        <mai-button type="button a11y" appearance="subtle" size="medium" aria-pressed aria-label="Mode settings"><img src="/assets/icons/mode.svg" alt="" /></mai-button>
        <mai-button type="button" appearance="subtle" aria-label="Keyboard settings"><img src="/assets/icons/keyboard.svg" alt="" /></mai-button>
        <mai-button type="button" appearance="subtle" aria-label="Accessibility options"><img src="/assets/icons/accessibility.svg" alt="" /></mai-button>
        <mai-button type="button" appearance="subtle" aria-label="Volume settings"><img src="/assets/icons/volume.svg" alt="" /></mai-button>
      </div>
    </div>

  </div>
  </div>

  <script src="/js/web-components.min.js"></script>
  <script src="/js/flow.js"></script>
  <script src="/js/page.js"></script>

  <script>
    // Retrieve email from sessionStorage and populate the page
    window.addEventListener('load', () => {
      const emailEntered = document.getElementById('email-entered');
      const verificationEmail = document.querySelector('.verification-email');
      
      // Get email from sessionStorage (set by MSA_sisu page)
      const email = sessionStorage.getItem('msaEmail');
      
      // Update both email display elements if email was found
      if (email && emailEntered) {
        emailEntered.textContent = email;
      }
      if (email && verificationEmail) {
        verificationEmail.textContent = email;
      }
    });
  </script>

</body>

</html>
