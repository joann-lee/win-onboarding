<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>💻 OOBE Sandbox | MSA SISU > Create account</title>
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
  <link rel="preload" as="image" href="/assets/visuals/background-blurred.jpg" />
</head>
<body class="win11 light" data-page-id="msa_create" data-oobe>
  <div class="oobe-background"></div>
  <div id="oobe-nav-root"></div>
  <div class="oobe-shell">
    <div class="oobe-main">
      <div class="oobe-card">
        <div class="card-back-button">
          <a href="/pages/MSA_sisu.html" class="back-btn" aria-label="Back to sign in">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
        <div id="lottie" class="lottie-container"></div>

        <div class="oobe-content">
          <header class="oobe-header">
            <h1>Let's add your Microsoft account</h1>
            <div class="subtitle">One account connects your device across Microsoft apps and services, like Office, OneDrive, Microsoft Edge and the Microsoft Store.</div>
          </header>
          <div class="oobe-body">
            <div class="msa-signin-container">
              <div class="msa-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25">
                  <rect x="0" y="0" width="11" height="11" fill="#f25022"/>
                  <rect x="13" y="0" width="11" height="11" fill="#7fba00"/>
                  <rect x="0" y="13" width="11" height="11" fill="#00a4ef"/>
                  <rect x="13" y="13" width="11" height="11" fill="#ffc40f"/>
                </svg>
                <span class="msa-logo-text">Microsoft</span>
              </div>
              <h2 class="signin-heading">Create account</h2>
              <div class="device-name-input-wrapper">
                <input 
                  type="text" 
                  id="msa-email-input" 
                  class="device-name-input" 
                  placeholder="someone@example.com"
                  aria-label="someone@example.com"
                />
                <button class="device-name-clear" id="msa-clear" aria-label="Clear email" style="display: none;">✕</button>
              </div>

              <div class="signin-links">
                <p class="no-account"><a href="MSA_create_email.html">Get a new email address</a></p>
              </div>

            </div>
          </div>
          <div class="oobe-ctas">
            <a class="button-secondary" data-cta="skip">Back</a>
            <button class="button-primary" data-cta="next" id="msa-create-next" disabled>Next</button>
          </div>
        </div>

      </div>
      <div class="oobe-below-actions">
        <!-- Accessibility section, no need to update -->
        <button type="button a11y" aria-label="Mode settings"><img src="/assets/icons/mode.svg" alt="" /></button>
        <button type="button a11y" aria-label="Keyboard settings"><img src="/assets/icons/keyboard.svg" alt="" /></button>
        <button type="button a11y" aria-label="Accessibility options"><img src="/assets/icons/accessibility.svg" alt="" /></button>
        <button type="button a11y" aria-label="Volume settings"><img src="/assets/icons/volume.svg" alt="" /></button>
      </div>
    </div>

  </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>
  <script src="/assets/animations/MSA_signin.js"></script>
  <script src="/js/flow.js"></script>
  <script src="/js/page.js"></script>

</body>

</html>
