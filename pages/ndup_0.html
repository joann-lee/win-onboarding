<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>💻 OOBE Sandbox | NDUP - Details</title>
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <link rel="stylesheet" href="/css/ndup.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
  <link rel="preload" as="image" href="/assets/visuals/background-blurred.jpg" />
</head>

<body class="win11 light" data-page-id="ndup_0" data-oobe>
  <div class="oobe-background"></div>
  <div id="oobe-nav-root"></div>
  <div class="oobe-shell">
    <div class="oobe-main">
      <div class="oobe-card">
        <div class="ndup-carousel">
          <div class="carousel-arrows">
            <button class="carousel-arrow" id="carousel-prev" aria-label="Previous">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="carousel-arrow" id="carousel-next" aria-label="Next">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <div class="carousel-content">
            <div class="carousel-video" id="carousel-video"></div>
            <div class="carousel-header">
              <h2 id="carousel-title">Loading content...</h2>
              <p id="carousel-description">Please wait</p>
            </div>
            <div class="carousel-dots" id="carousel-dots"></div>
          </div>
        </div>
      </div>
 <div class="ndup-footer">
    <div class="ndup-footer-header">
    Your update is in progress—this could take a while. Please keep your PC on and plugged in.
    </div>
    <span id="progress-label">Step 1 of 3: Downloading (0%)</span>
      
    <div class="ndup-progress-bar">
      <div class="progress-segment">
        <div class="progress-fill" id="segment-download"></div>
      </div>
      <div class="progress-segment">
        <div class="progress-fill" id="segment-install"></div>
      </div>
      <div class="progress-segment">
        <div class="progress-fill" id="segment-setup"></div>
      </div>
    </div>
 <a href="#" id="cancel-link" class="ndup-cancel-link">Update later</a>

  </div>

  </div>

 
  <div class="oobe-below-actions">
    <button type="button a11y" aria-label="Keyboard settings"><img src="/assets/icons/keyboard.svg" alt="" /></button>
    <button type="button a11y" aria-label="Accessibility options"><img src="/assets/icons/accessibility.svg" alt="" /></button>
    <button type="button a11y" aria-label="Volume settings"><img src="/assets/icons/volume.svg" alt="" /></button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>
  <script src="/assets/animations/NDUP.js"></script>
  <script src="/js/flow.js"></script>
  <script src="/js/page.js"></script>

  <script>
    const carouselItems = [
      {
        title: 'Copilot—your everyday AI companion',
        description: 'Jumpstart your productivity and creativity with a few words. Get answers to your questions to get more done. Spark new ideas, or describe what you want to create to get help bringing yours to life—and that’s just the start.',
        video: '/assets/videos/Copilot-NDUP-V18.mp4'
      },
      {
        title: 'Recall: Your PC’s photographic memory',
        description: 'Recall (preview) helps you quickly and securely find and act on content—like documents, images, emails and websites.',
        video: '/assets/videos/Recall-NDUP-No-Disclaimer-V02.mp4'
      },
      {
        title: 'Describe it. Find it, like magic.',
        description: 'Skip the scavenger hunt—just type what you remember in File Explorer, Windows Search, or Settings, and improved Windows search delivers. Quickly find documents, settings, or images.',
        video: '/assets/videos/NDUP-Search-V09.mp4'
      },
      {
        title: 'Take action on anything you see',
        description: 'Click to Do (preview) highlights text and images where you can blur backgrounds, erase objects, search for info, and more. Open with Windows logo key + mouse click or Windows logo key + Q.',
        video: '/assets/videos/ClickToDo_NDUP_MASTER-V07.mp4'
      },
      {
        title: 'Cocreator lets your imagination paint the picture',
        description: 'Light your spark with Cocreator. Describe your vision and sketch your idea, then AI works with you to co-create digital art and bring your idea to life.',
        video: '/assets/videos/Paint-V24.mp4'
      },
      {
        title: 'Translate and caption audio and video in real time',
        description: 'Live captions help make content accessible, so you can understand speakers easily and keep the conversation going. Open live captions any time from quick settings.​',
        video: '/assets/videos/Captions-CONS-No-Disclaimer-V31.mp4'
      }
    ];

    let currentIndex = 0;
    let currentStage = parseInt(sessionStorage.getItem('ndup-currentStage') || '0');
    let stageProgress = parseInt(sessionStorage.getItem('ndup-stageProgress') || '0');

    // Timing configuration (in milliseconds)
    const PROGRESS_INCREMENT_INTERVAL = 800; // How often to increment progress
    const STAGE_TRANSITION_DELAY = 500; // Delay before moving to next stage

    function renderCarousel() {
      const item = carouselItems[currentIndex];
      document.getElementById('carousel-title').textContent = item.title;
      document.getElementById('carousel-description').textContent = item.description;
      
      // Update video
      const videoElement = document.getElementById('carousel-video');
      videoElement.innerHTML = `<video autoplay muted loop style="width: 100%; height: 100%; object-fit: cover;">
        <source src="${item.video}" type="video/mp4">
      </video>`;

      // Update dots
      const dots = document.querySelectorAll('.carousel-dot');
      dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === currentIndex);
      });
    }

    function initCarousel() {
      const dotsContainer = document.getElementById('carousel-dots');
      carouselItems.forEach((_, idx) => {
        const dot = document.createElement('div');
        dot.className = 'carousel-dot';
        if (idx === currentIndex) dot.classList.add('active');
        dot.addEventListener('click', () => {
          currentIndex = idx;
          renderCarousel();
        });
        dotsContainer.appendChild(dot);
      });
      renderCarousel();
    }

    function updateProgressBar() {
      const stages = ['download', 'install', 'setup'];
      const stepLabels = ['Downloading', 'Installing', 'Setting up'];
      
      // Update segments based on current stage and progress
      stages.forEach((stage, idx) => {
        const segment = document.getElementById(`segment-${stage}`);
        if (idx < currentStage) {
          // Previous stages are complete - fill 100%
          segment.style.width = '100%';
        } else if (idx === currentStage) {
          // Current stage is animating - fill based on progress
          segment.style.width = stageProgress + '%';
        } else {
          // Future stages are empty
          segment.style.width = '0%';
        }
      });

      // Update label
      document.getElementById('progress-label').textContent = `Step ${currentStage + 1} of 3: ${stepLabels[currentStage]} (${Math.floor(stageProgress)}%)`;

      // Save state to sessionStorage
      sessionStorage.setItem('ndup-currentStage', currentStage.toString());
      sessionStorage.setItem('ndup-stageProgress', stageProgress.toString());
    }

    // Simulate loading bar progression
    function simulateLoading() {
      if (currentStage < 3) {
        stageProgress += Math.random() * 15 + 5; // Increment by 5-20%
        
        if (stageProgress >= 100) {
          stageProgress = 100;
          updateProgressBar();
          
          // Move to next stage after a delay
          setTimeout(() => {
            if (currentStage < 2) {
              currentStage++;
              stageProgress = 0;
              updateProgressBar();
            } else if (currentStage === 2) {
              // All stages complete - trigger restart
              clearInterval(loadingInterval);
              sessionStorage.removeItem('ndup-currentStage');
              sessionStorage.removeItem('ndup-stageProgress');
              // Navigate to reboot page as per NDUP's restartAfter setting
              const currentId = 'ndup';
              const nextId = window.nextPageId && window.nextPageId(currentId);
              if (nextId) {
                sessionStorage.setItem('oobeRestartDestination', nextId);
              }
              window.location.href = window.getPagePath('reboot.html');
            }
          }, STAGE_TRANSITION_DELAY);
        } else {
          updateProgressBar();
        }
      }
    }

    // Initialize progress bar segments
    updateProgressBar();

    // Start loading simulation
    const loadingInterval = setInterval(simulateLoading, PROGRESS_INCREMENT_INTERVAL);

    document.getElementById('carousel-prev').addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + carouselItems.length) % carouselItems.length;
      renderCarousel();
    });

    document.getElementById('carousel-next').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % carouselItems.length;
      renderCarousel();
    });

    document.getElementById('cancel-link').addEventListener('click', (e) => {
      e.preventDefault();
      clearInterval(loadingInterval);
      // Clear the progress state
      sessionStorage.removeItem('ndup-currentStage');
      sessionStorage.removeItem('ndup-stageProgress');
      // Navigate to reboot page as per NDUP's restartAfter setting
      const currentId = 'ndup';
      const nextId = window.nextPageId && window.nextPageId(currentId);
      if (nextId) {
        sessionStorage.setItem('oobeRestartDestination', nextId);
      }
      window.location.href = window.getPagePath('reboot.html');
    });

    initCarousel();
  </script>
</body>

</html>
