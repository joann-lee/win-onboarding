<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>💻 OOBE Sandbox | Boot</title>
  <link rel="stylesheet" href="/css/win11.css" type="text/css" id="style-base" />
  <link rel="stylesheet" href="/css/win11.light.css" type="text/css" id="style-light" />
  <link rel="stylesheet" href="/css/win11.dark.css" type="text/css" id="style-dark" />
  <script src="/js/theme-init.js"></script>
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-standard.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
</head>

<body data-page-id="boot" data-oobe>
  <div class="boot-container">
    <div class="boot-content">
      <div class="microsoft-logo-frame">
        <svg class="microsoft-logo" width="46" height="46" viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 0H21.739V21.737H0V0ZM24.0056 0H45.7426V21.737H24.0056V0ZM0 24.0066H21.739V45.7426H0V24.0066ZM24.0056 24.0066H45.7426V45.7426H24.0056V24.0066Z" fill="white"/>
        </svg>
      </div>
      <div class="boot-loader">
        <svg class="boot-spinner" viewBox="0 0 50 50">
          <circle class="spinner-ring" cx="25" cy="25" r="20" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" />
        </svg>
      </div>
    </div>
  </div>

  <script src="/js/flow.js"></script>

  <script>
    // Handle boot sequence then navigate to first OOBE page
    document.addEventListener('DOMContentLoaded', function() {
      // Wait for boot animation then continue to first OOBE page
      // 2s logo only + 2s loader = 4s total
      setTimeout(() => {
        const currentId = document.body.getAttribute('data-page-id');
        const nextId = window.nextPageId(currentId);
        if (nextId) {
          const nextFile = window.getPageFile(nextId);
          const nextHref = window.getPagePath(nextFile);
          window.location.href = nextHref;
        } else {
          // End of flow - go to desktop
          window.location.href = '/desktop/';
        }
      }, 4000);
    });
  </script>

  <style>
    body[data-page-id="boot"] {
      background: #000;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    body[data-page-id="boot"] * {
      cursor: none;
    }

    .boot-container {
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
    }

    .boot-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      opacity: 0;
      animation: fadeIn 1s ease-in-out forwards;
      position: relative;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .microsoft-logo-frame {
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .microsoft-logo {
      width: 100%;
      height: 100%;
    }

    .boot-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin-top: 240px;
      opacity: 0;
      animation: fadeInLoader 1s ease-in-out 2s forwards;
    }

    @keyframes fadeInLoader {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .boot-spinner {
      width: 32px;
      height: 32px;
      animation: boot-spin 2.4s linear infinite;
    }

    .spinner-ring {
      /* Circle circumference = 2 * PI * r = 2 * 3.14159 * 20 ≈ 125.66 */
      stroke-dasharray: 1, 126;
      stroke-dashoffset: 0;
      animation: boot-dash 2.4s ease-in-out infinite;
    }

    @keyframes boot-spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes boot-dash {
      0% {
        stroke-dasharray: 1, 126;
        stroke-dashoffset: 0;
      }
      50% {
        stroke-dasharray: 82, 126;
        stroke-dashoffset: -35;
      }
      100% {
        stroke-dasharray: 82, 126;
        stroke-dashoffset: -124;
      }
    }

    /* Hide OOBE elements on boot page */
    .oobe-background,
    .oobe-shell,
    #oobe-nav-root {
      display: none !important;
    }
  </style>
</body>

</html>
