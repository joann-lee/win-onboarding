<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>document.documentElement.style.backgroundColor=localStorage.getItem('themeMode')==='light'?'#f0f5fa':'#0a0a0a';</script>

  <title>💻 OOBE Sandbox | PIN</title>
  <script src="/js/theme-init.js"></script>
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-standard.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-violet.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-dune.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-sapphire.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-slate.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-emerald.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
<style>
    body[data-page-id="pin_0"] .oobe-body {
      margin-top: 100px;
    }
  </style>
  </head>

<body data-page-id="pin_0" data-oobe>
  <div class="oobe-background"></div>
  <div id="oobe-nav-root"></div>
  <div class="oobe-shell">
    <div class="oobe-main">
      <div class="oobe-card">
        <div id="lottie" class="lottie-container"></div>

        <div class="oobe-content">
          <header class="oobe-header">
            <h1>Set up a PIN</h1>
            <div class="subtitle">A Windows Hello PIN is a quick, secure way to sign in to your device, apps, and services. It must be at least 4 characters.</div>
          </header>
          <div class="oobe-body pin-input-wrapper">
            <div class="pin-input-group">
              <mai-text-input 
                type="password" 
                id="pin-input" 
                placeholder="Enter PIN"
                inputmode="numeric"
                aria-label="New PIN"
              >PIN</mai-text-input>
            </div>

            <div class="pin-input-group">
              <mai-text-input 
                type="password" 
                id="pin-confirm" 
                placeholder="Confirm PIN"
                inputmode="numeric"
                aria-label="Confirm PIN"
              >Confirm PIN</mai-text-input>
            </div>

            <!-- <div class="pin-checkbox-group">
              <mai-field label-position="above">
                <label slot="label">Include letters and symbols</label>
                <mai-checkbox 
                  slot="input"
                  id="pin-letters-checkbox"
                  aria-label="Include letters and symbols"
                ></mai-checkbox>
              </mai-field>
            </div> -->
          </div>
          <div class="oobe-ctas">
             <!-- <mai-button appearance="subtle" size="large" id="cancel-btn" style="view-transition-name: none;">Cancel</mai-button> -->
            <mai-button appearance="primary" size="large" data-cta="next" disabled>Set PIN</mai-button>
          </div>
        </div>

      </div>
      <div class="oobe-below-actions">
        <!-- Accessibility section, no need to update -->
        <button type="button a11y" aria-label="Mode settings"><img src="/assets/icons/mode.svg" alt="" /></button>
        <button type="button a11y" aria-label="Keyboard settings"><img src="/assets/icons/keyboard.svg" alt="" /></button>
        <button type="button a11y" aria-label="Accessibility options"><img src="/assets/icons/accessibility.svg" alt="" /></button>
        <button type="button a11y" aria-label="Volume settings"><img src="/assets/icons/volume.svg" alt="" /></button>
      </div>
    </div>

  </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>

  <script src="/assets/animations/Pin.js"></script>
  <script src="/js/web-components.min.js"></script>
  <script src="/js/flow.js"></script>
  <script src="/js/page.js"></script>
<script>
    const pinInput = document.getElementById('pin-input');
    const pinConfirm = document.getElementById('pin-confirm');
    const nextBtn = document.querySelector('[data-cta="next"]');

    function checkPinMatch() {
      const pin1 = pinInput.value.trim();
      const pin2 = pinConfirm.value.trim();
      
      // Enable button only if both fields have content, are at least 4 chars, and they match
      if (pin1 && pin2 && pin1.length >= 4 && pin1 === pin2) {
        nextBtn.disabled = false;
      } else {
        nextBtn.disabled = true;
      }
    }

    pinInput.addEventListener('input', checkPinMatch);
    pinConfirm.addEventListener('input', checkPinMatch);
  </script>
</body>

</html>
