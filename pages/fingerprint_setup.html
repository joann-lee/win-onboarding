<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>💻 OOBE Sandbox | Fingerprint Setup</title>
  <link rel="stylesheet" href="/css/win11.css" type="text/css" />
  <link rel="stylesheet" href="/css/win11.light.css" type="text/css" />
  <link rel="stylesheet" href="/css/win11.dark.css" type="text/css" />
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
  <link rel="preload" as="image" href="/assets/visuals/background-blurred.jpg" />
</head>

<body class="win11 light" data-page-id="fingerprint_setup" data-oobe>
  <div class="oobe-background"></div>
  <div id="oobe-nav-root"></div>
  <div class="oobe-shell">
    <div class="oobe-main">
      <div class="oobe-card">
        <div id="lottie" class="lottie-container"></div>

        <div class="oobe-content">
          <header class="oobe-header"></header>
          <div class="oobe-body">
            <div class="fingerprint-sensor-demo">
              <svg width="80" height="80" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="12" y="8" width="40" height="48" fill="#0078d4" rx="4"/>
                <circle cx="32" cy="28" r="14" stroke="white" stroke-width="1.5" fill="none"/>
                <path d="M32 16C24 16 18 22 18 30C18 33 19 35 21 37M32 40C40 40 46 34 46 26C46 23 45 21 43 19" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <div class="keyboard-demo">
                <div class="keyboard-key">Q</div>
                <div class="keyboard-key">W</div>
                <div class="keyboard-key">E</div>
                <div class="keyboard-key">R</div>
                <div class="keyboard-key">T</div>
                <div class="keyboard-key">Y</div>
                <div class="keyboard-key">U</div>
                <div class="keyboard-key">I</div>
                <div class="keyboard-key">O</div>
                <div class="keyboard-key">P</div>
                <div class="keyboard-key spacer"></div>
                <div class="keyboard-key spacer"></div>
                <div class="keyboard-key spacer"></div>
                <div class="keyboard-key">A</div>
                <div class="keyboard-key">S</div>
                <div class="keyboard-key">D</div>
                <div class="keyboard-key f-key">F</div>
                <div class="keyboard-key">G</div>
                <div class="keyboard-key">H</div>
                <div class="keyboard-key">J</div>
                <div class="keyboard-key">K</div>
                <div class="keyboard-key">L</div>
              </div>
            </div>
          </div>
          <div class="oobe-ctas">
            <div class="fingerprint-bottom-text">
              <h2 class="fingerprint-instruction">Touch the power button</h2>
              <p class="fingerprint-setup-hint">Repeatedly rest and lift your finger on the sensor on the power button until setup is complete.</p>
            </div>
            <a class="button-secondary" data-cta="skip">Skip for now</a>
          </div>
        </div>

      </div>
      <div class="oobe-below-actions">

                <!-- Accessibility section, no need to update -->
        <button type="button a11y" aria-label="Mode settings"><img src="/assets/icons/mode.svg" alt="" /></button>
        <button type="button a11y" aria-label="Keyboard settings"><img src="/assets/icons/keyboard.svg" alt="" /></button>
        <button type="button a11y" aria-label="Accessibility options"><img src="/assets/icons/accessibility.svg" alt="" /></button>
        <button type="button a11y" aria-label="Volume settings"><img src="/assets/icons/volume.svg" alt="" /></button>

      </div>
    </div>

  </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>
  <script src="/assets/animations/Fingerprint.js"></script>
  <script src="/js/flow.js"></script>
  <script src="/js/page.js"></script>
  <script>
    let touchCount = 0;
    const requiredTouches = 5;
    const nextBtn = document.querySelector('[data-cta="next"]');
    const sensorSvg = document.querySelector('.fingerprint-sensor-demo svg');
    const fKey = document.querySelector('.keyboard-key.f-key');

    function simulateTouch() {
      touchCount++;
      sensorSvg.style.opacity = '0.6';
      fKey.style.transform = 'scale(0.95)';
      
      setTimeout(() => {
        sensorSvg.style.opacity = '1';
        fKey.style.transform = 'scale(1)';
      }, 150);

      if (touchCount >= requiredTouches) {
        nextBtn.disabled = false;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'f') {
        simulateTouch();
      }
    });
  </script>
</body>

</html>
