<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>💻 OOBE Sandbox | Region</title>
  <link rel="stylesheet" href="/css/win11.css" type="text/css" id="style-base" />
  <link rel="stylesheet" href="/css/win11.light.css" type="text/css" id="style-light" />
  <link rel="stylesheet" href="/css/win11.dark.css" type="text/css" id="style-dark" />
  <script src="/js/theme-init.js"></script>
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-standard.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-violet.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-dune.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-sapphire.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-slate.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-emerald.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
  </head>

<body data-page-id="ndup" data-oobe>
  <div class="oobe-background"></div>
  <div id="oobe-nav-root"></div>
  <div class="oobe-shell">
    <div class="oobe-main">
      <div class="oobe-card">


        <div class="oobe-content">
          <header class="oobe-header">
            <h1>Getting things ready</h1>
            <!-- <div class="subtitle">If you also use another keyboard layout, you can add that next.</div> -->
          </header>
          <div class="oobe-body">

    <div>
    <p>Your update is in progress. Please keep your PC on and plugged in.</p>
    <br>
    <p id="progress-label">Step 1 of 3: Downloading</p>
    </div>
      
    <div class="ndup-progress-bar">
      <div class="progress-segment" data-step="1">
        <div class="progress-fill" id="segment-download" data-step="1"></div>
      </div>
      <div class="progress-segment" data-step="2">
        <div class="progress-fill" id="segment-install" data-step="2"></div>
      </div>
      <div class="progress-segment" data-step="3">
        <div class="progress-fill" id="segment-setup" data-step="3"></div>
      </div>
    </div>
 <a href="#" id="cancel-link" class="ndup-cancel-link">Update later</a>



          </div>
      
        </div>

      </div>
      <div class="oobe-below-actions">
        <!-- Accessibility section, no need to update -->
        <mai-button type="button a11y" appearance="subtle" size="medium" aria-pressed aria-label="Mode settings"><img src="/assets/icons/mode.svg" alt="" /></mai-button>
        <mai-button type="button a11y" appearance="subtle" size="medium" aria-label="Keyboard settings"><img src="/assets/icons/keyboard.svg" alt="" /></mai-button>
        <mai-button type="button a11y" appearance="subtle" size="medium" aria-label="Accessibility options"><img src="/assets/icons/accessibility.svg" alt="" /></mai-button>
        <mai-button type="button a11y" appearance="subtle" size="medium" aria-label="Volume settings"><img src="/assets/icons/volume.svg" alt="" /></mai-button>
      </div>
    </div>

  </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>
  <script src="/assets/animations/Region.js"></script>
  <script src="/js/scrollbar.js"></script>
  <script src="/js/web-components.min.js"></script>
  <script src="/js/flow.js"></script>
  <script src="/js/page.js"></script>

  <script>
    // NDUP Progress Label Update with Percentage
    const steps = [
      { step: 1, label: 'Step 1 of 3: Downloading', duration: 40000 },
      { step: 2, label: 'Step 2 of 3: Installing', duration: 30000 },
      { step: 3, label: 'Step 3 of 3: Setting up', duration: 20000 }
    ];

    // Generate CSS animations dynamically based on steps
    function generateAnimationCSS() {
      let css = '';
      let delayAccumulated = 0;

      steps.forEach((stepData) => {
        const durationSeconds = stepData.duration / 1000;
        const delaySeconds = delayAccumulated / 1000;
        
        css += `.progress-segment[data-step="${stepData.step}"] .progress-fill {
  animation: fillProgress ${durationSeconds}s ease-in-out forwards;
  animation-delay: ${delaySeconds}s;
}\n\n`;
        
        delayAccumulated += stepData.duration;
      });

      return css;
    }

    // Inject CSS into page
    function injectAnimationCSS() {
      const style = document.createElement('style');
      style.textContent = generateAnimationCSS();
      document.head.appendChild(style);
    }

    injectAnimationCSS();

    const progressLabel = document.getElementById('progress-label');
    const startTime = Date.now();
    let animationFrameId;
    let lastDisplayedPercentage = -5; // Track last displayed percentage
    let lastStepIndex = -1; // Track last step index to detect step changes

    function updateProgress() {
      const elapsedTime = Date.now() - startTime;
      const totalDuration = steps.reduce((sum, s) => sum + s.duration, 0);
      
      // Calculate which step we're in
      let timeAccumulated = 0;
      let currentStepIndex = 0;
      let timeInCurrentStep = elapsedTime;

      for (let i = 0; i < steps.length; i++) {
        if (elapsedTime < timeAccumulated + steps[i].duration) {
          currentStepIndex = i;
          timeInCurrentStep = elapsedTime - timeAccumulated;
          break;
        }
        timeAccumulated += steps[i].duration;
      }

      // Reset percentage tracker when stepping to a new phase
      if (currentStepIndex !== lastStepIndex) {
        lastStepIndex = currentStepIndex;
        lastDisplayedPercentage = -5;
      }

      if (currentStepIndex < steps.length) {
        const currentStepData = steps[currentStepIndex];
        const percentage = Math.round((timeInCurrentStep / currentStepData.duration) * 100);
        const clampedPercentage = Math.min(percentage, 100);
        
        // Only update label every 5 percent
        if (clampedPercentage >= lastDisplayedPercentage + 5 || clampedPercentage === 100) {
          progressLabel.textContent = `${currentStepData.label} (${clampedPercentage}%)`;
          lastDisplayedPercentage = Math.floor(clampedPercentage / 5) * 5;
        }
        
        // Continue animation if not finished
        if (elapsedTime < totalDuration) {
          animationFrameId = requestAnimationFrame(updateProgress);
        }
      }
    }

    // Start the progress updates
    updateProgress();
  </script>

</body>

</html>
