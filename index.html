<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>document.documentElement.style.backgroundColor=localStorage.getItem('themeMode')==='light'?'#f0f5fa':'#0a0a0a';</script>
  <title>💻 OOBE Sandbox | Set up</title>
  <script>
    (function() {
      // Set defaults on first load
      if (!localStorage.getItem('cssStyle')) {
        localStorage.setItem('cssStyle', 'evolved');
      }
      if (!localStorage.getItem('themePalette')) {
        localStorage.setItem('themePalette', 'violet');
      }
      if (!localStorage.getItem('themeMode')) {
        localStorage.setItem('themeMode', 'dark');
      }
      
      // IMMEDIATELY set background color to prevent white flash
      var mode = localStorage.getItem('themeMode') || 'dark';
      document.documentElement.style.backgroundColor = mode === 'dark' ? '#0a0a0a' : '#f0f5fa';
    })();
  </script>
  <link rel="stylesheet" href="/css/win11.css" type="text/css" id="style-base" />
  <link rel="stylesheet" href="/css/win11.light.css" type="text/css" id="style-light" />
  <link rel="stylesheet" href="/css/win11.dark.css" type="text/css" id="style-dark" />
  <script>
    (function() {
      var style = localStorage.getItem('cssStyle');
      if (style === 'evolved') {
        document.getElementById('style-base').href = '/css/evolved.css';
        document.getElementById('style-light').href = '/css/evolved.light.css';
        document.getElementById('style-dark').href = '/css/evolved.dark.css';
      } else {
        // Explicitly set win11 as default
        document.getElementById('style-base').href = '/css/win11.css';
        document.getElementById('style-light').href = '/css/win11.light.css';
        document.getElementById('style-dark').href = '/css/win11.dark.css';
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="view-transition" content="same-origin" />
  <link rel="stylesheet" href="/css/main.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-standard.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-violet.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-dune.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-sapphire.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-slate.css" type="text/css" />
  <link rel="stylesheet" href="/css/variables-emerald.css" type="text/css" />
  <link rel="stylesheet" href="/css/page.css" type="text/css" />
  <link rel="stylesheet" href="/css/index.css" type="text/css" />
</head>

<body>
  <div class="oobe-background"></div>
  <div class="oobe-shell">
    <div class="oobe-main">
      <div class="oobe-card has-contained-overlay">
        <div class="oobe-card-overlay">
          <h1>OOBE Sandbox</h1>
          <div class="landing-sub">This is an entirely HTML and CSS recreation of OOBE. This does not reflect PROD code, only a reverse-engineering of pages for prototyping purposes.</div>

          <div class="flow-container">
            <div class="flow-preview" id="flow-preview" aria-label="Current flow order and editor">
              <strong style="display:block; margin-bottom:6px; font-size:13px;">Flow Editor</strong>
              <ul id="flow-list"></ul>

            </div>
          </div>
          <!-- <div class="presets-subtitle">Presets</div> -->
          <div class="presets-row">
            <div class="theme-controls">
              <mai-field label-position="after">
                <label slot="label">Dark mode</label>
                <mai-switch id="mode-toggle" name="mode-toggle" slot="input"></mai-switch>
              </mai-field>
              <mai-dropdown id="css-style" placeholder="Win11">
                <mai-listbox>
                  <mai-option value="win11">Win11</mai-option>
                  <mai-option value="evolved">Evolved</mai-option>
                </mai-listbox>
              </mai-dropdown>
              <mai-dropdown id="color-palette" placeholder="Standard (Blue)">
                <mai-listbox>
                  <mai-option value="standard">Standard (Blue)</mai-option>
                  <mai-option value="violet">Violet</mai-option>
                  <mai-option value="dune">Dune</mai-option>
                  <mai-option value="sapphire">Sapphire</mai-option>
                  <mai-option value="slate">Slate</mai-option>
                  <mai-option value="emerald">Emerald</mai-option>
                </mai-listbox>
              </mai-dropdown>
            </div>
            <!-- <a id="holiday-25" class="button-secondary" href="#">Holiday 25</a> -->
            <!-- <a id="spring-26" class="button-secondary" href="#">Spring 26</a> -->
            <!-- <a id="fall-26" class="button-secondary" href="#">Fall 26</a> -->

          </div>
        </div>

        <div class="start-row">
          <mai-button id="reset-flow" appearance="secondary" size="large">Reset</mai-button>
          <mai-button id="start-btn" appearance="primary" size="large">Start</mai-button>
        </div>

      </div>
    </div>
  </div>

  <script src="/js/web-components.min.js"></script>
  <script src="/js/flow.js"></script>
  <script src="/js/page.js"></script>
  <script src="/js/index.js"></script>
</body>

</html>
